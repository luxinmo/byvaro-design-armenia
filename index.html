    <!--

      Captura los 4 eventos del paywall (paywall.shown, subscribe_clicked,
      dismissed, usage_pill.clicked) emitidos por src/lib/analytics.ts.

      El snippet inicializa `window.posthog` antes de que monte React, de
      forma que la primera llamada a `track()` ya encuentra el cliente
      listo. Si el snippet falla en cargar (adblock, red), `window.posthog`
      queda undefined y `analytics.ts::track()` lo omite silenciosamente
      (try/catch) · console.info sigue funcionando.

      TODO(backend/analytics): Replace POSTHOG_API_KEY_PLACEHOLDER with real
      key before production. Get the key from
      https://app.posthog.com/project/settings (Project API Key, NOT the
      personal API key). Cuando se reemplace, los eventos empezarán a
      llegar al dashboard sin tocar más código.

      Nota: con el placeholder, PostHog rechazará los eventos en su
      backend (401) pero el cliente NO crashea · loguea un warning en
      red y sigue. Aceptable durante validación local · cambiar antes de
      desplegar a producción.

    <div id="root"></div>
    <script>
      // SPA fallback decoder (contraparte de public/404.html).
      // Si venimos redirigidos por el 404, recuperamos la URL original
      // antes de que React Router tome el control.
      (function () {
        var r = sessionStorage.getItem('__spa_redirect');
        if (r) {

          history.replaceState(null, '', r);
