<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Byvaro · Diseño v2</title>
    <meta name="description" content="Byvaro · plataforma para promotores inmobiliarios. Diseño v2." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // SPA fallback decoder (contraparte de public/404.html).
      // Si venimos redirigidos por el 404, recuperamos la URL original
      // antes de que React Router tome el control.
      (function () {
        var r = sessionStorage.getItem('__spa_redirect');
        if (r) {
          sessionStorage.removeItem('__spa_redirect');
          history.replaceState(null, '', r);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
