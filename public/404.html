<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Byvaro · Redirigiendo…</title>
  <script>
    // SPA fallback para GitHub Pages.
    // Pages sirve este 404.html cuando no encuentra una ruta estática.
    // Codificamos la URL actual en sessionStorage y redirigimos a la raíz
    // del proyecto, donde el index.html la decodifica y la pasa a React Router.
    (function () {
      var segmentCount = 1; // /byvaro-design-armenia/ cuenta como 1 segmento
      var l = window.location;
      sessionStorage.setItem('__spa_redirect', l.pathname + l.search + l.hash);
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/'
      );
    })();
  </script>
</head>
<body></body>
</html>
